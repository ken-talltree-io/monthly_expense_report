name: Deploy Dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unlock git-crypt
        run: |
          sudo apt-get install -y git-crypt
          echo "$GITCRYPT_KEY" | base64 -d > /tmp/git-crypt-key
          git-crypt unlock /tmp/git-crypt-key
          rm /tmp/git-crypt-key
        env:
          GITCRYPT_KEY: ${{ secrets.GITCRYPT_KEY }}

      - name: Generate dashboard
        run: python3 dashboard.py

      - name: Encrypt dashboard with staticrypt
        run: |
          npx staticrypt dashboard.html -p "$STATICRYPT_PASSWORD" -d _site --short
          mv _site/dashboard.html _site/index.html
          printf "User-agent: *\nDisallow: /\n" > _site/robots.txt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
